name: Deploy Backend to Vercel

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: >-
          dev = preview build + alias https://blowtorch-api-dev.vercel.app
          | prod = vercel --prod (production domain on the linked project)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Sync OpenRouter key to Vercel (API)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          python3 << 'PY'
          import json, os, urllib.error, urllib.request

          token = os.environ["VERCEL_TOKEN"]
          pid = os.environ["VERCEL_PROJECT_ID"]
          value = os.environ["OPENROUTER_API_KEY"]
          base_list = f"https://api.vercel.com/v9/projects/{pid}/env"
          base_create = f"https://api.vercel.com/v10/projects/{pid}/env"

          def api_json(method, url, body=None):
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body).encode() if body else None,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      return resp.status, resp.read().decode()
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          # Remove existing OPENROUTER_API_KEY entries (upsert)
          code, text = api_json("GET", base_list)
          if code != 200:
              raise SystemExit(f"LIST env failed {code}: {text[:400]}")
          existing = json.loads(text).get("envs") or []
          for row in existing:
              if row.get("key") == "OPENROUTER_API_KEY":
                  eid = row.get("id")
                  del_url = f"{base_list}/{eid}"
                  c, t = api_json("DELETE", del_url)
                  if c not in (200, 204):
                      print(f"warn: delete env {eid} -> {c}: {t[:200]}")

          payload = {
              "key": "OPENROUTER_API_KEY",
              "value": value,
              "type": "encrypted",
              "target": ["production", "preview", "development"],
          }
          code, text = api_json("POST", base_create, payload)
          if code not in (200, 201):
              raise SystemExit(f"CREATE env failed {code}: {text[:500]}")
          print("OPENROUTER_API_KEY synced to Vercel project env")
          PY
        continue-on-error: true

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          cd apps/api

          USE_PROD=""
          ALIAS_DEV=0

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.target }}" in
              dev)
                ALIAS_DEV=1
                ;;
              prod)
                USE_PROD="--prod"
                ;;
              *)
                echo "Invalid target"
                exit 1
                ;;
            esac
          else
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              USE_PROD="--prod"
            fi
            if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
              ALIAS_DEV=1
            fi
          fi

          DEPLOYMENT_URL=$(vercel $USE_PROD --yes --token "$VERCEL_TOKEN" \
            -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
            -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }})

          echo "Deployed to: $DEPLOYMENT_URL"

          if [ "$ALIAS_DEV" = "1" ]; then
            vercel alias set "$DEPLOYMENT_URL" blowtorch-api-dev.vercel.app --token "$VERCEL_TOKEN"
            echo "Aliased to: https://blowtorch-api-dev.vercel.app"
          fi
