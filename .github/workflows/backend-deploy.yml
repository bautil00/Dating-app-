name: Deploy Backend to Vercel

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          cd apps/api
          PROD_FLAG=""
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            PROD_FLAG="--prod"
          fi
          DEPLOYMENT_URL=$(vercel $PROD_FLAG --yes --token ${{ secrets.VERCEL_TOKEN }} \
            -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
            -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }})
          
          echo "Deployed to: $DEPLOYMENT_URL"
          
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            vercel alias set $DEPLOYMENT_URL blowtorch-api-dev.vercel.app --token ${{ secrets.VERCEL_TOKEN }} --yes
            echo "Aliased to: https://blowtorch-api-dev.vercel.app"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}