name: Deploy Backend to Vercel

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: >-
          dev = preview build + alias https://blowtorch-api-dev.vercel.app
          | prod = vercel --prod (production domain on the linked project)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Sync OpenRouter key to Vercel project env
        working-directory: apps/api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          for ENV in production preview development; do
            vercel env add OPENROUTER_API_KEY "$ENV" \
              --value "$OPENROUTER_API_KEY" \
              --yes --sensitive --force --token "$VERCEL_TOKEN"
          done

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          cd apps/api

          USE_PROD=""
          ALIAS_DEV=0

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.target }}" in
              dev)
                ALIAS_DEV=1
                ;;
              prod)
                USE_PROD="--prod"
                ;;
              *)
                echo "Invalid target"
                exit 1
                ;;
            esac
          else
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              USE_PROD="--prod"
            fi
            if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
              ALIAS_DEV=1
            fi
          fi

          DEPLOYMENT_URL=$(vercel $USE_PROD --yes --token "$VERCEL_TOKEN" \
            -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
            -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }})

          echo "Deployed to: $DEPLOYMENT_URL"

          if [ "$ALIAS_DEV" = "1" ]; then
            vercel alias set "$DEPLOYMENT_URL" blowtorch-api-dev.vercel.app --token "$VERCEL_TOKEN"
            echo "Aliased to: https://blowtorch-api-dev.vercel.app"
          fi
